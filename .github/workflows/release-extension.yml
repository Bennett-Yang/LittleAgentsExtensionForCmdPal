name: Build Microsoft Store MSIX bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: Four-part MSIX version; leave blank to use AppxPackageVersion from the project
        required: false
        type: string
  push:
    tags:
      - "store-v*"

permissions:
  contents: read

concurrency:
  group: store-package-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_FILE: LittleAgentsExtension/LittleAgentsExtension.csproj
  TEST_PROJECT: LittleAgentsExtension.Tests/LittleAgentsExtension.Tests.csproj
  STORE_BUILD_SCRIPT: LittleAgentsExtension/build-store.ps1

jobs:
  build-store-package:
    name: Build and validate Partner Center bundle
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $requestedVersion = ([string]$env:REQUESTED_VERSION).Trim()

          if ($requestedVersion) {
              $version = $requestedVersion
              $source = "workflow input"
          }
          elseif ($env:REF_TYPE -eq "tag") {
              $tag = $env:REF_NAME
              if (-not $tag.StartsWith("store-v", [StringComparison]::Ordinal)) {
                  throw "Store tag '$tag' must start with 'store-v'."
              }

              $version = $tag.Substring("store-v".Length)
              $source = "tag $tag"
          }
          else {
              [xml]$project = Get-Content -LiteralPath $env:PROJECT_FILE
              $version = [string]($project.Project.PropertyGroup.AppxPackageVersion |
                  Where-Object { $_ } |
                  Select-Object -First 1)
              $source = $env:PROJECT_FILE
          }

          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
              throw "MSIX version '$version' must contain four numeric components, for example 0.1.2.0."
          }

          foreach ($component in $version.Split('.')) {
              [int]$number = 0
              if (-not [int]::TryParse($component, [ref]$number) -or $number -gt 65535) {
                  throw "Every MSIX version component must be between 0 and 65535: '$version'."
              }
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building package version $version from $source."

      - name: Restore test dependencies
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT

      - name: Run tests
        shell: pwsh
        run: dotnet test $env:TEST_PROJECT --configuration Release --no-restore

      - name: Build and validate x64 and ARM64 MSIX bundle
        shell: pwsh
        run: |
          & $env:STORE_BUILD_SCRIPT -Version "${{ steps.version.outputs.version }}"

      - name: Create bundle checksum
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundle = "LittleAgentsExtension/LittleAgentsExtension_${version}_Bundle.msixbundle"

          if (-not (Test-Path -LiteralPath $bundle)) {
              throw "Expected Store bundle was not produced: $bundle"
          }

          $hash = Get-FileHash -LiteralPath $bundle -Algorithm SHA256
          $checksum = "$bundle.sha256"
          "$($hash.Hash)  $(Split-Path -Leaf $bundle)" |
              Set-Content -LiteralPath $checksum -Encoding ascii

          "bundle_path=$bundle" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksum" >> $env:GITHUB_OUTPUT
          "sha256=$($hash.Hash)" >> $env:GITHUB_OUTPUT

      - name: Upload Partner Center submission artifact
        uses: actions/upload-artifact@v4
        with:
          name: LittleAgentsExtension-${{ steps.version.outputs.version }}-PartnerCenter
          path: |
            ${{ steps.package.outputs.bundle_path }}
            ${{ steps.package.outputs.checksum_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Write build summary
        shell: pwsh
        run: |
          @(
              "## Microsoft Store package"
              ""
              "- Version: ${{ steps.version.outputs.version }}"
              "- Architectures: x64, ARM64"
              "- Bundle: ${{ steps.package.outputs.bundle_path }}"
              "- SHA-256: ${{ steps.package.outputs.sha256 }}"
              "- Artifact: LittleAgentsExtension-${{ steps.version.outputs.version }}-PartnerCenter"
              ""
              "Upload the .msixbundle from this artifact to Partner Center. The bundle is intentionally unsigned; Microsoft Store signs it during ingestion."
          ) >> $env:GITHUB_STEP_SUMMARY
